<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Infantry Crew</title>
  <link rel="stylesheet" href="tank.css">
</head>

<body>

<div id="tankWidget">

  <div class="tank-header drag">
    <div class="brand">
      <img src="assets/infanterie.png" class="brand-logo">
      <div>
        <div class="brand-title">INFANTRY CREW</div>
        <div class="brand-subtitle">BY TONTONCAROTTE</div>
      </div>
    </div>

    <button id="closeTank">×</button>
  </div>

  <div class="crew-form">
    <input id="tankName1" placeholder="MOI">
    <input id="tankName2" placeholder="ÉQUIPIER 2">
    <input id="tankName3" placeholder="ÉQUIPIER 3">
    <input id="tankName4" placeholder="ÉQUIPIER 4">
    <input id="tankName5" placeholder="ÉQUIPIER 5">
    <input id="tankName6" placeholder="ÉQUIPIER 6">
  </div>

  <div class="crew-actions">
    <button id="saveCrew">VALIDER</button>
    <button id="clearCrew">EFFACER</button>
  </div>

  <div class="tank-total">
    <span>KILLS TOTAL</span>
    <strong id="tankKills">0</strong>
  </div>

  <div id="crewList"></div>

</div>

<script src="tank.js"></script>
</body>
</html>
